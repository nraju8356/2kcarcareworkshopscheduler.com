<script>
const firebaseConfig = {
  apiKey: "AIzaSyA7wQjSY7hZUL71Z66FkOENqWUIrGfYOzo",
  authDomain: "k-car-care.firebaseapp.com",
  projectId: "k-car-care",
  storageBucket: "k-car-care.firebasestorage.app",
  messagingSenderId: "670021530342",
  appId: "1:670021530342:web:4da5f3aac81931282bc127"
};

let db = null;
let firebaseConnected = false;

try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    console.log("✅ Firebase initialized");
} catch (e) { 
    console.error("❌ Firebase init failed:", e);
    updateSyncStatus("error", "❌ Firebase failed to initialize: " + e.message);
}

const DEFAULT_USER = "admin"; const DEFAULT_PASS = "2kcare"; 
const TEAMS = ["Team 1", "Team 2", "Team 3", "Team 4", "Team 5"];
const CAPACITY_PER_DAY = 5;
const VEHICLE_MAKERS = ["Maruti Suzuki", "Hyundai", "Tata", "Mahindra", "Honda", "Toyota", "Kia", "MG", "Renault", "Nissan", "Skoda", "Volkswagen", "Ford", "Fiat", "Jeep", "Volvo", "BMW", "Mercedes", "Audi", "Other"];

let state = { jobs: [], counter: 1 };
let view = "dashboard"; 
let filter = "all"; 
let workTypeFilter = "all";
let dateFilter = "all"; 
let searchTerm = "";
let printJob = null; let calendarMonth = new Date().getMonth(); let calendarYear = new Date().getFullYear();
let selectedDay = null; let capacityCheckDate = todayStr(); 
let jobToDelete = null;
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const editMakerSelect = document.getElementById('edit_maker');
VEHICLE_MAKERS.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    editMakerSelect.appendChild(opt);
});

function updateSyncStatus(type, message) {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    el.className = 'sync-status ' + type;
    el.textContent = message;
}

function getTeamWorkload() {
  const workload = { "Team 1": 0, "Team 2": 0, "Team 3": 0, "Team 4": 0, "Team 5": 0 };
  state.jobs.forEach(j => {
    if (j.status !== "Delivered" && j.status !== "Deleted" && workload[j.team] !== undefined) workload[j.team]++;
  });
  return workload;
}

function startRealtimeSync() {
    if (!db) {
        updateSyncStatus("error", "❌ Firebase not initialized.");
        return;
    }
    updateSyncStatus("loading", "⏳ Connecting to cloud database...");

    db.collection("jobs").get().then((snapshot) => {
        firebaseConnected = true;
        updateSyncStatus("connected", "✅ Connected to cloud - Syncing with all users");
    }).catch((error) => {
        updateSyncStatus("error", "❌ Connection failed: " + error.message);
    });

    db.collection("jobs").onSnapshot((snapshot) => {
        state.jobs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (view === "search") updateSearchResults(); else render();
        if (firebaseConnected) updateSyncStatus("connected", `✅ Live Sync Active - ${state.jobs.length} jobs`);
    }, (error) => {
        updateSyncStatus("error", "❌ Sync error: " + error.message);
    });

    db.collection("settings").doc("app").onSnapshot((doc) => {
        if (doc.exists) state.counter = doc.data().counter || 1; 
        else { db.collection("settings").doc("app").set({ counter: 1 }); state.counter = 1; }
    });
}

function handleLogin(e) {

function toast(msg, isError = false) { 
  const area = document.getElementById("toastArea");
  area.innerHTML = `<div class="toast no-print ${isError ? 'error' : ''}">${msg}<button onclick="document.getElementById('toastArea').innerHTML=''">✕</button></div>`; 
  setTimeout(()=>{ area.innerHTML=""; }, 5000);
}

function todayStr() { return new Date().toISOString().split("T")[0]; }
function addDays(dateStr, days) { const d = new Date(dateStr); d.setDate(d.getDate()+days); return d.toISOString().split("T")[0]; }
function formatDate(dateStr) { if(!dateStr) return ""; const d = new Date(dateStr+"T00:00:00"); return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}); }
function rangeDates(start,end) { const dates=[]; let cur=new Date(start); const last=new Date(end); while(cur<=last){ dates.push(cur.toISOString().split("T")[0]); cur.setDate(cur.getDate()+1); } return dates; }
function getDeliveryDate(jobType,startDate,majorDays) { if (jobType === "Emergency") return addDays(startDate, 1); if (jobType === "Minor") return addDays(startDate, 3); return addDays(startDate, majorDays || 5); }
function getCapacityForDate(date, excludeId) { return state.jobs.filter(j=>{ if(j.id===excludeId) return false; if(j.status==="Delivered" || j.status==="Deleted") return false; return rangeDates(j.startDate,j.deliveryDate).includes(date); }).length; }

function renderDateSelect(id, selectedDate) {
  let html = `<select id="${id}" style="width: 100%; background: var(--gray-900); border: 1px solid var(--gray-700); border-radius: 6px; padding: 10px 12px; color: #fff; font-size: 0.9rem;">`;
  for (let i = 0; i < 30; i++) {
    const d = addDays(todayStr(), i); const count = getCapacityForDate(d, null); const remaining = CAPACITY_PER_DAY - count;
    let statusText = remaining > 0 ? `(${remaining} slots avail)` : '(FULL)';
    html += `<option value="${d}" ${d === selectedDate ? 'selected' : ''} ${remaining <= 0 ? 'disabled' : ''}>${formatDate(d)} ${statusText}</option>`;
  }
  return html + `</select>`;
}

function changeView(newView) { view = newView; render(); }
function setFilter(f) { filter = f; workTypeFilter = "all"; view = "dashboard"; render(); }
function setWorkTypeFilter(workType) { workTypeFilter = workType; filter = "all"; view = "dashboard"; render(); }
function clearFilters() { 
  filter = "all"; workTypeFilter = "all"; searchTerm = ""; dateFilter = "all"; 
  document.getElementById("filterDate").value = "all"; 
  view = "dashboard"; render(); 
}
function setDateFilter(val) { dateFilter = val; view = "dashboard"; render(); }

function render() {
  document.getElementById("todayLabel").textContent = formatDate(todayStr());
  document.querySelectorAll(".toolbar button").forEach(b=>b.classList.remove("active"));
  
  const addBtn = document.querySelector('button[onclick="changeView(\'add\')"]');
  const searchBtn = document.querySelector('button[onclick="changeView(\'search\')"]');
  if(addBtn && view==="add") addBtn.classList.add("active");
  if(searchBtn && view==="search") searchBtn.classList.add("active");
  if(filter==="emergency") document.querySelector('button[onclick="setFilter(\'emergency\')"]').classList.add("active");
  if(filter==="major") document.querySelector('button[onclick="setFilter(\'major\')"]').classList.add("active");
  if(filter==="minor") document.querySelector('button[onclick="setFilter(\'minor\')"]').classList.add("active");
  
  if(workTypeFilter==="denting") document.querySelector('button[onclick="setWorkTypeFilter(\'denting\')"]').classList.add("active");
  if(workTypeFilter==="painting") document.querySelector('button[onclick="setWorkTypeFilter(\'painting\')"]').classList.add("active");
  if(workTypeFilter==="polishing") document.querySelector('button[onclick="setWorkTypeFilter(\'polishing\')"]').classList.add("active");

  const alertBtn = document.getElementById("alertBtn");
  const today = todayStr();
  const dueToday = state.jobs.filter(j=>j.deliveryDate===today && j.status!=="Delivered" && j.status!=="Deleted");
  alertBtn.textContent = "🔔" + (dueToday.length?` (${dueToday.length})`:"");
  alertBtn.className = "tool no-print " + (dueToday.length ? "alert" : "gray");
  if(view==="alerts") alertBtn.classList.add("active");

  const activeEl = document.activeElement;
  let inputStates = {};
  const currentInputs = document.querySelectorAll("#mainArea input, #mainArea textarea, #mainArea select");
  currentInputs.forEach(el => {
    if (el.id) {
      inputStates[el.id] = { value: el.value, scrollTop: el.scrollTop || 0 };
      if (el === activeEl) {
        inputStates[el.id].selectionStart = el.selectionStart;
        inputStates[el.id].selectionEnd = el.selectionEnd;
        inputStates[el.id].active = true;
      }
    }
  });

  const main = document.getElementById("mainArea");
  try {
    if(view==="dashboard") main.innerHTML = renderDashboard();
    else if(view==="add") main.innerHTML = renderAddForm();
    else if(view==="search") main.innerHTML = renderSearch();
    else if(view==="capacity") main.innerHTML = renderCapacity();
    else if(view==="calendar") main.innerHTML = renderCalendar();
    else if(view==="report") main.innerHTML = renderReport();
    else if(view==="alerts") main.innerHTML = renderAlerts();
  } catch(e) { main.innerHTML = `<div class="empty" style="color:red">Error: ${e.message}</div>`; }

  renderModal();

  for (const id in inputStates) {
    const el = document.getElementById(id);
    if (el) {
      el.value = inputStates[id].value;
      el.scrollTop = inputStates[id].scrollTop;
      if (inputStates[id].active) {
        setTimeout(() => {
          el.focus({ preventScroll: true });
          if (typeof inputStates[id].selectionStart === 'number' && el.setSelectionRange) {
            try { el.setSelectionRange(inputStates[id].selectionStart, inputStates[id].selectionEnd); } catch (e) {}
          }
        }, 0);
      }
    }
  }

  if (view === "search") {
    const searchInput = document.getElementById("searchInput");
    if (searchInput) searchInput.value = searchTerm;
  }

  attachHandlers();
  if (view === "search") updateSearchResults();
}

function normalizeWorkItems(wi) {
  if (!wi || !Array.isArray(wi)) return [];
  return wi.map(item => {
    if (typeof item === 'string') return { name: item, done: false };
    if (typeof item === 'object' && item.name) return { name: item.name, done: !!item.done };
    return null;
  }).filter(Boolean);
}

function getVisibleJobs() {
  let jobs = [...state.jobs].filter(j => j.status !== "Deleted").sort((a,b)=> a.startDate<b.startDate?1:-1);
  if(filter==="emergency") jobs = jobs.filter(j=>j.jobType==="Emergency");
  if(filter==="major") jobs = jobs.filter(j=>j.jobType==="Major");
  if(filter==="minor") jobs = jobs.filter(j=>j.jobType==="Minor");
  if(workTypeFilter !== "all") {
    jobs = jobs.filter(j => {
      const items = normalizeWorkItems(j.workItems);
      return items.some(item => item.name && item.name.toLowerCase().includes(workTypeFilter.toLowerCase()));
    });
  }
  const today = todayStr();
  if(dateFilter === "today") jobs = jobs.filter(j => j.deliveryDate === today && j.status !== "Delivered");
  else if(dateFilter === "week") { const endOfWeek = addDays(today, 7); jobs = jobs.filter(j => j.deliveryDate >= today && j.deliveryDate <= endOfWeek && j.status !== "Delivered"); }
  else if(dateFilter === "overdue") jobs = jobs.filter(j => j.deliveryDate < today && j.status !== "Delivered");
  if(searchTerm.trim()){
    const t=searchTerm.trim().toLowerCase();
    jobs = jobs.filter(j=> j.vehicleNo.toLowerCase().includes(t) || (j.vehicleMaker && j.vehicleMaker.toLowerCase().includes(t)) || j.customerName.toLowerCase().includes(t) || j.jobCardNo.toLowerCase().includes(t));
  }
  return jobs;
}
function statusClass(s){ return "status-"+s.replace(" ","_"); }

function renderWorkTags(job) {
  const items = normalizeWorkItems(job.workItems);
  if (items.length === 0) return '';
  const tags = items.map((item, idx) => {
    const isDone = item.done;
    const bg = isDone ? 'rgba(34,197,94,0.2)' : 'rgba(250,204,21,0.1)';
    const border = isDone ? 'var(--green)' : 'var(--yellow)';
    const color = isDone ? '#4ade80' : 'var(--yellow)';
    const check = isDone ? '✅ ' : ''; 
    const strike = isDone ? 'text-decoration: line-through; opacity: 0.8;' : '';
    return `<span onclick="toggleWorkItem('${job.id}', ${idx})" style="background:${bg}; border:1px solid ${border}; color:${color}; padding:4px 8px; border-radius:4px; font-size:0.7rem; white-space:nowrap; cursor:pointer; user-select:none; ${strike}">${check}${item.name}</span>`;
  }).join(' ');
  return `<div style="margin-top:6px; display:flex; flex-wrap:wrap; gap:4px;">${tags}</div>`;
}

function toggleWorkItem(jobId, index) {
  const job = state.jobs.find(j => j.id === jobId);
  if (!job) return;
  const items = normalizeWorkItems(job.workItems);
  if (index < 0 || index >= items.length) return;
  items[index].done = !items[index].done;
  job.workItems = items;
  if (db) db.collection("jobs").doc(jobId).update({ workItems: items }).catch(e => toast("❌ Failed: " + e.message, true));
  render();
}

function updateCapacityDate(val) { capacityCheckDate = val; render(); }

function renderCalendar() {
  const firstDay = new Date(calendarYear, calendarMonth, 1).getDay(); const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  let html = `<h2>Calendar View</h2><div class="cal-toolbar"><button class="navbtn" onclick="changeMonth(-1)">&lt;</button><select id="calMonth" onchange="calendarMonth=parseInt(this.value);render();" style="flex:1">${MONTH_NAMES.map((m, i) => `<option value="${i}" ${i === calendarMonth ? 'selected' : ''}>${m}</option>`).join('')}</select><select id="calYear" onchange="calendarYear=parseInt(this.value);render();" style="width: 90px;">${[calendarYear - 2, calendarYear - 1, calendarYear, calendarYear + 1, calendarYear + 2].map(y => `<option value="${y}" ${y === calendarYear ? 'selected' : ''}>${y}</option>`).join('')}</select><button class="navbtn" onclick="changeMonth(1)">&gt;</button></div><div class="cal-weekdays"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div><div class="cal-grid">`;
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;
  const today = todayStr();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const count = getCapacityForDate(dateStr, null); const isFull = count >= CAPACITY_PER_DAY;
    html += `<button class="cal-cell ${isFull ? 'full' : ''} ${dateStr === selectedDay ? 'selected' : ''}" onclick="selectDay('${dateStr}')"><div class="num ${dateStr === today ? 'today' : ''}">${d}</div><div class="cnt ${isFull ? 'full' : 'ok'}">${count}/${CAPACITY_PER_DAY}</div></button>`;
  }
  html += `</div>`;
  if (selectedDay) {
    const dayJobs = state.jobs.filter(j => rangeDates(j.startDate, j.deliveryDate).includes(selectedDay) && j.status !== "Deleted");
    html += `<h3 style="margin-top:20px; font-size:0.9rem; color:var(--yellow)">Jobs on ${formatDate(selectedDay)}</h3>`;
    if (dayJobs.length === 0) html += `<div class="empty" style="padding:16px">No jobs.</div>`;
    else dayJobs.forEach((j, index) => { 
      html += `<div class="day-detail"><div style="display:flex; align-items:center; gap:10px;"><span style="background:var(--yellow); color:#000; font-weight:800; padding:4px 10px; border-radius:4px;">${index + 1}</span><div><div style="font-family:monospace;color:var(--yellow)">${j.jobCardNo}</div><div><strong>${j.vehicleMaker || ''}</strong> · <strong>${j.vehicleNo}</strong> · ${j.customerName}</div>${renderWorkTags(j)}</div></div><button class="icon-btn" onclick="openPrint('${j.id}')">🖨️</button> <button class="icon-btn danger" onclick="requestDelete('${j.id}')">🗑️</button></div>`; 
    });
  }
  return html;
}

function selectDay(dateStr) { selectedDay = selectedDay === dateStr ? null : dateStr; render(); }

function renderWorkItemsForPrint(job) {
  const items = normalizeWorkItems(job.workItems);
  if (items.length === 0) return '';
  const lines = items.map(item => { const check = item.done ? '✅ ' : '☐ '; return `${check}${item.name}`; });
  return `<div class="row"><span>Work Checklist</span><span style="text-align:right">${lines.join('<br>')}</span></div>`;
}

function renderModal() {
  const area = document.getElementById("modalArea");
  if(!printJob){ area.innerHTML=""; return; }
  const j = printJob;
  area.innerHTML = `<div class="modal-bg"><div class="modal"><button class="close" onclick="closePrint()">✕</button><h2>2K CAR CARE</h2>
  <div class="row bold"><span>Job Card No.</span><span>${j.jobCardNo}</span></div>
  <div class="row"><span>Vehicle Maker</span><span>${j.vehicleMaker || "-"}</span></div>
  <div class="row"><span>Vehicle No.</span><span>${j.vehicleNo}</span></div>
  <div class="row"><span>Customer</span><span>${j.customerName}</span></div>
  <div class="row"><span>Phone</span><span>${j.phone||"-"}</span></div>
  <div class="row"><span>Type</span><span>${j.jobType}</span></div>
  <div class="row"><span>Team</span><span>${j.team}</span></div>
  <div class="row"><span>Start</span><span>${formatDate(j.startDate)}</span></div>
  <div class="row"><span>Delivery</span><span>${formatDate(j.deliveryDate)}</span></div>
  <div class="row bold"><span>Status</span><span style="color:var(--red); font-weight:800;">${j.status}</span></div>
  ${renderWorkItemsForPrint(j)}
  <div class="row"><span>Notes</span><span>${j.notes||"-"}</span></div>
  <button class="print-btn" onclick="window.print()">🖨️ Print Job Card</button>
  <button class="whatsapp-btn" onclick="shareWhatsApp('${j.id}')">💬 Share via WhatsApp</button></div></div>`;
}

function shareWhatsApp(jobId) {
  const job = state.jobs.find(j => j.id === jobId); if (!job) return;
  const items = normalizeWorkItems(job.workItems);
  let workText = '';
  if (items.length > 0) { const lines = items.map(item => { const check = item.done ? '✅' : '☐'; return `${check} ${item.name}`; }); workText = `*Work Checklist:*\n${lines.join('\n')}\n`; }
  const message = `*2K CAR CARE - Job Card*\n\n*Job Card No:* ${job.jobCardNo}\n*Vehicle Maker:* ${job.vehicleMaker || '-'}\n*Vehicle No:* ${job.vehicleNo}\n*Customer:* ${job.customerName}\n*Phone:* ${job.phone || '-'}\n*Type:* ${job.jobType}\n*Team:* ${job.team}\n*Start:* ${formatDate(job.startDate)}\n*Delivery:* ${formatDate(job.deliveryDate)}\n*Status:* ${job.status}\n${workText}${job.notes ? `*Notes:* ${job.notes}\n` : ''}`;
  let phone = (job.phone || '').replace(/\D/g, '');
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
}

function updateStatus(id, status) { 
  const job = state.jobs.find(j => j.id === id);
  if(job) {
      job.status = status;
      if (db) db.collection("jobs").doc(id).update({ status: status }).catch(e => toast("❌ Update failed: " + e.message, true));
      render();
  }
}

function requestDelete(id) {
  jobToDelete = id;
  document.getElementById('deletePasswordInput').value = '';
  document.getElementById('deleteModal').style.display = 'flex';
  setTimeout(() => document.getElementById('deletePasswordInput').focus(), 100);
}
function closeDeleteModal() { document.getElementById('deleteModal').style.display = 'none'; jobToDelete = null; }

function executeDelete() {
  const pwd = document.getElementById('deletePasswordInput').value;
  if (pwd === DEFAULT_PASS) {
    if (db) {
        db.collection("jobs").doc(jobToDelete).update({ 
            status: "Deleted", 
            deletedAt: firebase.firestore.FieldValue.serverTimestamp() 
        })
          .then(() => { toast("✅ Job archived for reports - Syncing..."); closeDeleteModal(); })
          .catch(e => toast("❌ Delete failed: " + e.message, true));
    }
  } else { toast("❌ Invalid password"); document.getElementById('deletePasswordInput').value = ''; document.getElementById('deletePasswordInput').focus(); }
}

function openEdit(id) {
    const job = state.jobs.find(j => j.id === id);
    if (!job) return;
    
    document.getElementById('edit_id').value = job.id;
    document.getElementById('edit_maker').value = job.vehicleMaker || '';
    document.getElementById('edit_vehicle').value = job.vehicleNo;
    document.getElementById('edit_customer').value = job.customerName;
    
    const fullPhone = job.phone || '';
    let code = '+91';
    let number = fullPhone;
    if (fullPhone.startsWith('+971')) { code = '+971'; number = fullPhone.substring(4); }
    else if (fullPhone.startsWith('+968')) { code = '+968'; number = fullPhone.substring(4); }
    else if (fullPhone.startsWith('+966')) { code = '+966'; number = fullPhone.substring(4); }
    else if (fullPhone.startsWith('+974')) { code = '+974'; number = fullPhone.substring(4); }
    else if (fullPhone.startsWith('+1')) { code = '+1'; number = fullPhone.substring(2); }
    else if (fullPhone.startsWith('+44')) { code = '+44'; number = fullPhone.substring(3); }
    else if (fullPhone.startsWith('+92')) { code = '+92'; number = fullPhone.substring(3); }
    else if (fullPhone.startsWith('+880')) { code = '+880'; number = fullPhone.substring(4); }
    else if (fullPhone.startsWith('+91')) { code = '+91'; number = fullPhone.substring(3); }
    
    document.getElementById('edit_countryCode').value = code;
    document.getElementById('edit_phone').value = number;
    
    document.getElementById('edit_type').value = job.jobType;
    document.getElementById('edit_majorDays').value = job.durationDays || 5;
    document.getElementById('edit_team').value = job.team;
    document.getElementById('edit_start').value = job.startDate;
    document.getElementById('edit_delivery').value = job.deliveryDate;
    document.getElementById('edit_notes').value = job.notes || '';
    
    // Show/hide major days field based on job type
    const majorDaysField = document.getElementById('edit_majorDaysField');
    if(majorDaysField) {
      majorDaysField.style.display = job.jobType === "Major" ? "block" : "none";
    }
    
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
}

function saveEdit() {
    const id = document.getElementById('edit_id').value;
    const vehicleMaker = document.getElementById('edit_maker').value;
    const vehicleNo = document.getElementById('edit_vehicle').value.trim(); 
    const customerName = document.getElementById('edit_customer').value.trim();
    const countryCode = document.getElementById('edit_countryCode').value;
    const phoneInput = document.getElementById('edit_phone').value.trim(); 
    const jobType = document.getElementById('edit_type').value;
    const majorDays = parseInt(document.getElementById('edit_majorDays').value, 10) || 5; 
    const assignedTeam = document.getElementById('edit_team').value;
    const startDate = document.getElementById('edit_start').value; 
    const deliveryDate = document.getElementById('edit_delivery').value;
    const notes = document.getElementById('edit_notes').value.trim();

    if(!vehicleMaker || vehicleMaker === "") { alert("⚠️ Please select a Vehicle Maker"); return; }
    if(!vehicleNo || !customerName){ alert("⚠️ Vehicle Number and Customer Name required"); return; }
    if(!startDate || !deliveryDate) { alert("⚠️ Start and Delivery dates are required"); return; }
    if(!notes || notes.trim() === "") { alert("⚠️ Notes are required! Please add work details."); return; }
    
    const vehicleClean = vehicleNo.toUpperCase().replace(/\s+/g, "");
    if (!/^[A-Z]{2}[0-9]{1,2}[A-Z]{1,2}[0-9]{4}$/.test(vehicleClean) && !/^[A-Z]{2}[0-9]{4}$/.test(vehicleClean)) { 
        alert("⚠️ Invalid Vehicle Number format"); return; 
    }
    
    const cleanPhone = phoneInput.replace(/[^0-9]/g, '');
    if (phoneInput) {
        if (countryCode === "+91" && cleanPhone.length !== 10) { alert("⚠️ Indian phone must be 10 digits"); return; }
        if (countryCode !== "+91" && (cleanPhone.length < 7 || cleanPhone.length > 15)) { alert("⚠️ Phone must be 7-15 digits"); return; }
    }
    
    if(jobType === "Major" && (majorDays < 5 || majorDays > 15)){ alert("⚠️ Major job: 5-15 days only"); return; }

    const fullPhone = phoneInput ? countryCode + cleanPhone : "";
    const workItems = notes ? notes.split(',').map(item => ({ name: item.trim(), done: false })).filter(item => item.name !== "") : [];

    const updateData = { 
        vehicleMaker, vehicleNo: vehicleClean, customerName, phone: fullPhone, jobType, 
        durationDays: jobType === "Major" ? majorDays : (jobType === "Minor" ? 3 : 1),
        team: assignedTeam, startDate, deliveryDate, notes, workItems
    };

    if (db) {
        db.collection("jobs").doc(id).update(updateData)
            .then(() => { 
                toast("✅ Job updated successfully!"); 
                closeEditModal(); 
            })
            .catch(e => toast("❌ Update failed: " + e.message, true));
    }
}

function openPrint(id) { printJob = state.jobs.find(j=>j.id===id); renderModal(); }
function closePrint() { printJob = null; renderModal(); }

function submitJob() {
  if (!db) { alert("❌ Firebase not connected!"); return; }
  const vehicleMaker = document.getElementById("f_maker").value;
  const vehicleNo = document.getElementById("f_vehicle").value.trim(); 
  const customerName = document.getElementById("f_customer").value.trim();
  const countryCode = document.getElementById("f_countryCode").value;
  const phoneInput = document.getElementById("f_phone").value.trim(); 
  const jobType = document.getElementById("f_type").value;
  const majorDays = parseInt(document.getElementById("f_majorDays").value, 10) || 5; 
  let assignedTeam = document.getElementById("f_team").value;
  const startDate = document.getElementById("f_start").value; 
  const notes = document.getElementById("f_notes").value.trim();

  if(!vehicleMaker || vehicleMaker === "") { alert("⚠️ Please select a Vehicle Maker"); return; }
  if(!vehicleNo || !customerName){ alert("⚠️ Vehicle Number and Customer Name required"); return; }
  
  if(!notes || notes.trim() === "") { 
      alert("⚠️ Notes are required! Please add work details (e.g., denting, painting)."); 
      return; 
  }
  
  const vehicleClean = vehicleNo.toUpperCase().replace(/\s+/g, "");
  if (!/^[A-Z]{2}[0-9]{1,2}[A-Z]{1,2}[0-9]{4}$/.test(vehicleClean) && !/^[A-Z]{2}[0-9]{4}$/.test(vehicleClean)) { alert("⚠️ Invalid Vehicle Number format"); return; }
  const cleanPhone = phoneInput ? phoneInput.replace(/[^0-9]/g, '') : '';
  if (phoneInput) {
    if (countryCode === "+91" && cleanPhone.length !== 10) { alert("⚠️ Indian phone must be 10 digits"); return; }
    if (countryCode !== "+91" && (cleanPhone.length < 7 || cleanPhone.length > 15)) { alert("⚠️ Phone must be 7-15 digits"); return; }
  }
  if(jobType === "Major" && (majorDays < 5 || majorDays > 15)){ alert("⚠️ Major job: 5-15 days only"); return; }

  if (assignedTeam === "Auto") {
    const workload = getTeamWorkload();
    let minTeam = TEAMS[0], minCount = workload[minTeam];
    for (const t of TEAMS) { if (workload[t] < minCount) { minCount = workload[t]; minTeam = t; } }
    assignedTeam = minTeam;
    toast(`✨ Auto-assigned to ${assignedTeam}`);
  }

  const deliveryDate = getDeliveryDate(jobType, startDate, majorDays);
  const jobCardNo = `2K-${new Date(startDate).getFullYear()}-${String(state.counter).padStart(4,"0")}`;
  const fullPhone = phoneInput ? countryCode + cleanPhone : "";
  const workItems = notes ? notes.split(',').map(item => ({ name: item.trim(), done: false })).filter(item => item.name !== "") : [];

  const newJob = { 
    vehicleMaker, jobCardNo, vehicleNo: vehicleClean, customerName, phone: fullPhone, jobType, 
    durationDays: jobType === "Major" ? majorDays : (jobType === "Minor" ? 3 : 1),
    team: assignedTeam, startDate, deliveryDate, status: "In Progress", notes, workItems,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection("jobs").add(newJob)
    .then(() => { 
        toast(`✅ Job added successfully! (Card No: ${jobCardNo})`); 
        state.counter++;
        db.collection("settings").doc("app").set({ counter: state.counter }, { merge: true });
        view = "dashboard";
    })
    .catch(e => alert("❌ Failed to save job!\n\nError: " + e.message));
}

function attachHandlers() {
  const startInput = document.getElementById("f_start"); 
  const typeSelect = document.getElementById("f_type");
  const majorDaysInput = document.getElementById("f_majorDays"); 
  const majorDaysField = document.getElementById("majorDaysField");
  const deliveryPreview = document.getElementById("deliveryPreview");
  
  if(startInput && typeSelect && deliveryPreview){
    const updatePreview = ()=>{
      const md = majorDaysInput ? (parseInt(majorDaysInput.value, 10) || 5) : 5;
      const deliveryDate = getDeliveryDate(typeSelect.value, startInput.value || todayStr(), md);
      deliveryPreview.innerHTML = `📅 Expected Delivery: <strong>${formatDate(deliveryDate)}</strong>`;
      if(majorDaysField) majorDaysField.style.display = typeSelect.value === "Major" ? "block" : "none";
    };
    startInput.addEventListener("change", updatePreview); 
    typeSelect.addEventListener("change", updatePreview);
    if(majorDaysInput) {
      majorDaysInput.addEventListener("input", function(e) {
        let val = e.target.value.replace(/\D/g, '');
        if (val === '') { e.target.value = ''; updatePreview(); return; }
        let num = parseInt(val, 10);
        if (num > 15) { e.target.value = 15; } 
        else if (val.length === 1 && num < 5 && num !== 1) { e.target.value = 5; } 
        else if (val.length >= 2 && num < 5) { e.target.value = 5; } 
        else { e.target.value = val; }
        updatePreview();
      });
    }
    updatePreview();
  }
  const searchInput = document.getElementById("searchInput");
  if(searchInput) searchInput.addEventListener("input", (e)=>{ searchTerm = e.target.value; updateSearchResults(); });
  const vehicleInput = document.getElementById("f_vehicle");
  if(vehicleInput) vehicleInput.addEventListener("input", (e)=>{ e.target.value = e.target.value.toUpperCase().slice(0,10); });
  
  // Phone number maxlength handler
  const countryCodeEl = document.getElementById("f_countryCode");
  const phoneInputEl = document.getElementById("f_phone");
  function updatePhoneLimit() {
    if (countryCodeEl && phoneInputEl) {
      const isIndia = countryCodeEl.value === "+91";
      const maxLen = isIndia ? 10 : 15;
      phoneInputEl.maxLength = maxLen;
      phoneInputEl.placeholder = isIndia ? "10 digit mobile number" : "Mobile number (7-15 digits)";
      const currentVal = phoneInputEl.value.replace(/\D/g, '');
      if (currentVal.length > maxLen) phoneInputEl.value = currentVal.slice(0, maxLen);
    }
  }
  if (countryCodeEl) countryCodeEl.addEventListener("change", updatePhoneLimit);
  if (phoneInputEl) {
    phoneInputEl.addEventListener("input", (e) => {
      let val = e.target.value.replace(/\D/g, '');
      const isIndia = countryCodeEl && countryCodeEl.value === "+91";
      const maxLen = isIndia ? 10 : 15;
      if (val.length > maxLen) val = val.slice(0, maxLen);
      if (e.target.value !== val) e.target.value = val;
    });
    updatePhoneLimit();
  }
}

startRealtimeSync();
checkAuth();
